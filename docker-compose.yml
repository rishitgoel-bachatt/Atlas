version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: atlas_postgres
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: atlas_pass
      POSTGRES_DB: atlas
    ports:
      - '15433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
